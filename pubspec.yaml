name: hadith_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  lottie: ^3.3.3
  reactive_forms: ^18.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
     - assets/images/
     - assets/images/lotties/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo.ttf

flutter_assets:
  assets_path: assets/
  output_path: lib/app/core/helper/
  filename: assets.dart
